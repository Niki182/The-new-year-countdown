<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>New Year Countdown</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="topbar">
        <h2>The countdown to the new year</h2>
    </div>
    <div>Next year:</div>
    <div id="year">2027</div>
    <div class="countdown">
        <div id="day">00</div>
        <div id="hour">00</div>
        <div id="minute">00</div>
        <div id="second">00</div>
    </div>
    <h3>Developed by Niki182</h3>
    <a href="https://github.com/Niki182/The-new-year-countdown" class="github" target="_blank">GitHub</a>
    <script src="scripts.js"></script>
</body>
</html>
